[tool.ruff]
target-version = "py311"
line-length = 100
exclude = [
  ".git",
  ".ruff_cache",
  "__pycache__",
  "external",
  "showdown-client",
  "showdown-server",
  "learned_weights",
  "outputs",
]

[tool.ruff.lint]
ignore = ["E402", "F401", "F403", "F405"]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
line-ending = "lf"
